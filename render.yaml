# Tells Render.com how to run this app.
# Render reads this automatically when you connect the repo.
databases:
  - name: speakport-db
    plan: free           # Render's free Postgres — see the note in README about its limits
    databaseName: speakport
    user: speakport

services:
  - type: web
    name: speakport
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Render generates a strong random secret for you and keeps it safe.
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Wires the web service to the database declared above automatically —
      # this is what makes your data survive restarts and redeploys.
      - key: DATABASE_URL
        fromDatabase:
          name: speakport-db
          property: connectionString
